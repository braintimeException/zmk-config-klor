# --- MASTER HALF ONLY CONFIGURATION ---

# Enable ZMK Pointing and Smooth Scrolling
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# Enable the PS/2 driver and ZMK Input subsystem
CONFIG_PS2=y
CONFIG_ZMK_INPUT_LISTENER=y
CONFIG_ZMK_INPUT_LISTENER_PS2=y

# Force disable UART console and logging to free up P0.09/P0.10
CONFIG_SERIAL=n
CONFIG_UART_CONSOLE=n
CONFIG_ZMK_USB_LOGGING=n
CONFIG_LOG=n
