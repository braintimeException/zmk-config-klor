# --- 1. CORE USB & LOGGING (Crucial for Debugging) ---
CONFIG_SERIAL=y
CONFIG_ZMK_USB=y
CONFIG_ZMK_USB_LOGGING=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=4

# Crank up debug output specifically for the trackpoint
CONFIG_PS2_LOG_LEVEL_DBG=y
CONFIG_UART_LOG_LEVEL_DBG=y

# Delays boot by 3 seconds so you have time to connect your serial monitor 
# to catch the initial PS/2 handshake!
CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=3000 

# --- 2. POINTING CAPABILITIES ---
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y
CONFIG_ZMK_POINTING_DEFAULT_SCRL_VAL=1

# --- 3. SYSTEM & BLUETOOTH (Good to have) ---
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
