# Uncomment these two line to add support for encoders to your firmware
#CONFIG_EC11=y
#CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Uncomment the following line to enable the KLOR OLED Display
# CONFIG_ZMK_DISPLAY=y

# Uncomment the following lines to enable per key RGB
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# Backlight
# CONFIG_ZMK_BACKLIGHT=y

#CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=40

# Enable ZMK as a "Keyboard" with Input/Output capabilities for pairing
CONFIG_ZMK_BLE_PASSKEY_ENTRY=y

# This causes the keyboard to frequently change its ID (MAC dddress)
CONFIG_BT_PRIVACY=n

# Enable ZMK Pointing and Smooth Scrolling
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# --- TRACKPOINT & PS/2 CONFIG ---

# Enable the PS/2 driver and ZMK Input subsystem
CONFIG_PS2=y
CONFIG_ZMK_INPUT_LISTENER_PS2=y

# In Zephyr 4.1, the pointing system uses the Input Listener
CONFIG_ZMK_INPUT_LISTENER=y

# IMPORTANT: Disable UART console so it doesn't fight the Trackpoint for pins P0.09/P0.10
CONFIG_SERIAL=n
CONFIG_UART_CONSOLE=n

# Power Management (Optional but recommended for travel)
# Allows the mouse to sleep when the keyboard does
CONFIG_ZMK_IDLE_TIMEOUT=30000
