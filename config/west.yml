manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: filippor
      url-base: https://github.com/filippor
  projects:
    - name: zmk
      remote: zmkfirmware
      revision: main
      import: app/west.yml
    - name: zmk-config-trackpoint
      repo-path: kb_zmk_ps2_mouse_trackpoint_driver
      remote: filippor
      revision: "4.1"
  self:
    path: config/
